services:
  wazuh-manager:
    image: wazuh/wazuh-manager@sha256:023db0e33bc9579cffbb052df776f7e23f17fa819eba55436c5a2bd51da87a8f
    hostname: wazuh-manager
    restart: always
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD:-CHANGE_ME_INDEXER_PASSWORD}

      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/wazuh-certs/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/wazuh-certs/wazuh.manager.pem
      - SSL_KEY=/etc/ssl/wazuh-certs/wazuh.manager-key.pem

      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${API_PASSWORD:-CHANGE_ME_API_PASSWORD}
    networks:
      default:
        aliases:
          - wazuh.manager
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat

      # Mount entire certs directory safely
      - ./config/wazuh_indexer_ssl_certs:/etc/ssl/wazuh-certs:ro

      # ossec.conf mount
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./config/wazuh_cluster/rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./config/wazuh_cluster/lists:/var/ossec/etc/lists:ro

  wazuh-indexer:
    image: wazuh/wazuh-indexer@sha256:e80791634b95236fbfcf1de0b929c979a8a4f4e8d85b7fbdc876fe9ec6a206d8
    hostname: wazuh-indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer

      # Mount entire certs directory directly to where indexer expects them
      - ./config/wazuh_indexer_ssl_certs:/usr/share/wazuh-indexer/config/certs:ro
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml:ro
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml:ro
    networks:
      default:
        aliases:
          - wazuh.indexer

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard@sha256:4df3c654fb0e8fd1e49b46adeec2fc12f270401898da084a2072ff3f3056bb9a
    hostname: wazuh-dashboard
    restart: always
    ports:
      - "5601:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${INDEXER_PASSWORD:-CHANGE_ME_INDEXER_PASSWORD}
      - WAZUH_API_URL=https://wazuh.manager:55000
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-CHANGE_ME_DASHBOARD_PASSWORD}
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${API_PASSWORD:-CHANGE_ME_API_PASSWORD}
    volumes:
      # Mount entire certs directory
      - ./config/wazuh_indexer_ssl_certs:/usr/share/wazuh-dashboard/certs:ro

      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro

      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      - wazuh-indexer
      - wazuh-manager

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:



