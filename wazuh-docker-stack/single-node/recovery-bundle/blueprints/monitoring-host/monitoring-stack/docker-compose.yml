services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9}
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml
      - ./targets:/etc/prometheus/targets:ro
    ports:
      - "9090:9090"
    networks:
      - monitoring
    depends_on:
      - alertmanager
      - blackbox-exporter
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O - http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  blackbox-exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE:-prom/blackbox-exporter@sha256:e753ff9f3fc458d02cca5eddab5a77e1c175eee484a8925ac7d524f04366c2fc}
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    cap_add:
      - NET_RAW
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O - http://127.0.0.1:9115/metrics >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager@sha256:88b605de9aba0410775c1eb3438f951115054e0d307f23f274a4c705f51630c1}
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./secrets/brevo_smtp_key.txt:/run/secrets/brevo_smtp_key.txt:ro
    ports:
      - "9093:9093"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O - http://127.0.0.1:9093/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  wazuh-alert-forwarder:
    image: ${FORWARDER_IMAGE:-python@sha256:7747d47f92cfca63a6e2b50275e23dba8407c30d8ae929a88ddd49a5d3f2d331}
    container_name: wazuh-alert-forwarder
    restart: unless-stopped
    command: ["python", "/app/wazuh_alert_forwarder.py"]
    environment:
      ALERTMANAGER_URL: ${ALERTMANAGER_URL:-http://alertmanager:9093/api/v2/alerts}
      WAZUH_ALERT_FILE: ${WAZUH_ALERT_FILE:-/wazuh-logs/alerts/alerts.json}
      WAZUH_DASHBOARD_URL: ${WAZUH_DASHBOARD_URL:-http://192.168.1.3:5601}
      MIN_RULE_LEVEL: ${MIN_RULE_LEVEL:-7}
      EXCLUDED_RULE_IDS: ${EXCLUDED_RULE_IDS:-17102,2902,2904,60776}
      EXCLUDED_RULE_GROUPS: ${EXCLUDED_RULE_GROUPS:-sca}
      DEDUP_WINDOW_SECONDS: ${DEDUP_WINDOW_SECONDS:-900}
      SURICATA_MAX_ALERT_SEVERITY: ${SURICATA_MAX_ALERT_SEVERITY:-2}
      SURICATA_EXCLUDED_CATEGORIES: ${SURICATA_EXCLUDED_CATEGORIES:-Not Suspicious Traffic}
      SURICATA_EXCLUDED_SIGNATURE_IDS: ${SURICATA_EXCLUDED_SIGNATURE_IDS:-}
      GEOLOOKUP_ENABLED: ${GEOLOOKUP_ENABLED:-true}
      GEOLOOKUP_URL_TEMPLATE: ${GEOLOOKUP_URL_TEMPLATE:-https://ipwho.is/{ip}}
      GEOLOOKUP_TIMEOUT_SECONDS: ${GEOLOOKUP_TIMEOUT_SECONDS:-5}
      FULL_LOG_MAX_LENGTH: ${FULL_LOG_MAX_LENGTH:-2000}
      CORRELATION_WINDOW_SECONDS: ${CORRELATION_WINDOW_SECONDS:-3600}
      CORRELATION_TIMELINE_LIMIT: ${CORRELATION_TIMELINE_LIMIT:-6}
      CORRELATION_HISTORY_LIMIT: ${CORRELATION_HISTORY_LIMIT:-100}
      START_FROM_END: ${START_FROM_END:-true}
      POLL_INTERVAL: ${POLL_INTERVAL:-1}
    volumes:
      - ./scripts/python:/app:ro
      - single-node_wazuh_logs:/wazuh-logs:ro
    networks:
      - monitoring
    depends_on:
      - alertmanager
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; assert os.path.exists('/app/wazuh_alert_forwarder.py'); urllib.request.urlopen('http://alertmanager:9093/-/healthy', timeout=5).read(1)\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  monitoring-service-index:
    image: ${SERVICE_INDEX_IMAGE:-python@sha256:7747d47f92cfca63a6e2b50275e23dba8407c30d8ae929a88ddd49a5d3f2d331}
    container_name: monitoring-service-index
    restart: unless-stopped
    command: ["python", "/app/monitoring_service_index.py"]
    environment:
      SERVICE_INDEX_BIND: 0.0.0.0
      SERVICE_INDEX_PORT: ${SERVICE_INDEX_PORT:-9088}
      SERVICE_INDEX_DOCS_ROOT: /docs
      PROMETHEUS_URL: http://prometheus:9090
    volumes:
      - ./scripts/python:/app:ro
      - ./docs/pdf-handbook:/docs:ro
    ports:
      - "${SERVICE_INDEX_PORT:-9088}:${SERVICE_INDEX_PORT:-9088}"
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; port=os.getenv('SERVICE_INDEX_PORT','9088'); urllib.request.urlopen(f'http://127.0.0.1:{port}/healthz', timeout=5).read(1)\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  monitoring-gateway:
    image: ${CADDY_IMAGE:-caddy@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17}
    container_name: monitoring-gateway
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - >
        export GATEWAY_ADMIN_USERNAME="$$(cat /run/secrets/gateway_admin_username.txt)" &&
        export GATEWAY_ADMIN_PASSWORD_HASH="$$(cat /run/secrets/gateway_admin_password_hash.txt)" &&
        caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    environment:
      MONITORING_GATEWAY_HOST: ${MONITORING_GATEWAY_HOST:-192.168.1.3}
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./secrets/gateway_admin_username.txt:/run/secrets/gateway_admin_username.txt:ro
      - ./secrets/gateway_admin_password_hash.txt:/run/secrets/gateway_admin_password_hash.txt:ro
      - ./local/gateway/caddy-data:/data
      - ./local/gateway/caddy-config:/config
    ports:
      - "${GATEWAY_SERVICE_INDEX_PORT:-9443}:9443"
      - "${GATEWAY_PROMETHEUS_PORT:-9444}:9444"
      - "${GATEWAY_ALERTMANAGER_PORT:-9445}:9445"
      - "${GATEWAY_BLACKBOX_PORT:-9446}:9446"
      - "${GATEWAY_WAZUH_DASHBOARD_PORT:-9447}:9447"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring
    depends_on:
      - monitoring-service-index
      - prometheus
      - alertmanager
      - blackbox-exporter
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -q -T 5 -O - https://127.0.0.1:9443/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

networks:
  monitoring:
    driver: bridge

volumes:
  single-node_wazuh_logs:
    external: true
