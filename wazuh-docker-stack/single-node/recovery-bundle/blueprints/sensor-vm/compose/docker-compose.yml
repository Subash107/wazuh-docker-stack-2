services:
  pihole:
    image: ${PIHOLE_IMAGE}
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "${PIHOLE_WEB_PORT}:80/tcp"
    environment:
      TZ: ${TZ}
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
      FTLCONF_webserver_api_password: ${PIHOLE_WEBPASSWORD}
      FTLCONF_dns_listeningMode: ${PIHOLE_LISTENING_MODE:-all}
      FTLCONF_dns_upstreams: ${PIHOLE_UPSTREAM_DNS}
    volumes:
      - ./data/pihole:/etc/pihole
      - ./data/dnsmasq.d:/etc/dnsmasq.d
      - ./logs/pihole:/var/log/pihole

  mitmproxy:
    image: ${MITMPROXY_IMAGE}
    container_name: mitmproxy
    restart: unless-stopped
    command:
      - mitmweb
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "${MITMPROXY_PROXY_PORT}"
      - --web-host
      - 0.0.0.0
      - --web-port
      - "${MITMPROXY_WEB_PORT}"
      - --set
      - block_global=false
      - --set
      - web_open_browser=false
    ports:
      - "${MITMPROXY_PROXY_PORT}:${MITMPROXY_PROXY_PORT}/tcp"
      - "${MITMPROXY_WEB_PORT}:${MITMPROXY_WEB_PORT}/tcp"
    volumes:
      - ./data/mitmproxy:/home/mitmproxy/.mitmproxy
