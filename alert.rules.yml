groups:
  - name: monitoring_stack_health
    rules:
      - alert: PrometheusTargetDown
        expr: up{job=~"prometheus|alertmanager|blackbox_exporter"} == 0
        for: 2m
        labels:
          severity: critical
          category: stack_health
        annotations:
          summary: "Monitoring service {{ $labels.job }} is unreachable"
          description: "Prometheus has been unable to scrape {{ $labels.instance }} for more than 2 minutes."

      - alert: PrometheusConfigReloadFailed
        expr: prometheus_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: critical
          category: stack_health
        annotations:
          summary: "Prometheus configuration reload failed"
          description: "Prometheus rejected the current configuration or rule files."

      - alert: AlertmanagerConfigReloadFailed
        expr: alertmanager_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: critical
          category: stack_health
        annotations:
          summary: "Alertmanager configuration reload failed"
          description: "Alertmanager rejected the current configuration file."

      - alert: AlertmanagerNotificationsFailing
        expr: increase(alertmanager_notifications_failed_total[10m]) > 0
        for: 10m
        labels:
          severity: warning
          category: stack_health
        annotations:
          summary: "Alertmanager notification delivery is failing"
          description: "Alertmanager has recorded failed notifications in the last 10 minutes."

  - name: ping_alerts
    rules:
      - alert: ServerDown
        expr: probe_success{job="ping_servers"} == 0
        for: 30s
        labels:
          severity: critical
          category: stack_health
        annotations:
          summary: "Server {{ $labels.instance }} is down"
          description: "ICMP probe failed for more than 30 seconds."

      - alert: ServerLatencyHigh
        expr: avg_over_time(probe_duration_seconds{job="ping_servers"}[5m]) > 1
        for: 10m
        labels:
          severity: warning
          category: stack_health
        annotations:
          summary: "Server {{ $labels.instance }} latency is elevated"
          description: "Average ICMP probe duration has stayed above 1 second for 10 minutes."

  - name: sensor_http_alerts
    rules:
      - alert: SensorHttpEndpointDown
        expr: probe_success{job="sensor_http_endpoints"} == 0
        for: 1m
        labels:
          severity: critical
          category: stack_health
        annotations:
          summary: "HTTP service {{ $labels.service_name }} is unreachable"
          description: "Blackbox HTTP probe to {{ $labels.instance }} has failed for more than 1 minute."

      - alert: SensorHttpEndpointSlow
        expr: avg_over_time(probe_duration_seconds{job="sensor_http_endpoints"}[5m]) > 2
        for: 10m
        labels:
          severity: warning
          category: stack_health
        annotations:
          summary: "HTTP service {{ $labels.service_name }} is slow"
          description: "Average HTTP probe duration for {{ $labels.instance }} has stayed above 2 seconds for 10 minutes."

  - name: gateway_https_alerts
    rules:
      - alert: GatewayHttpsEndpointDown
        expr: probe_success{job="gateway_https_endpoints"} == 0
        for: 1m
        labels:
          severity: critical
          category: stack_health
        annotations:
          summary: "Gateway service {{ $labels.service_name }} is unreachable"
          description: "Gateway probe to {{ $labels.instance }} has failed for more than 1 minute."

      - alert: GatewayHttpsEndpointSlow
        expr: avg_over_time(probe_duration_seconds{job="gateway_https_endpoints"}[5m]) > 2
        for: 10m
        labels:
          severity: warning
          category: stack_health
        annotations:
          summary: "Gateway service {{ $labels.service_name }} is slow"
          description: "Average gateway probe duration for {{ $labels.instance }} has stayed above 2 seconds for 10 minutes."

  - name: practice_http_alerts
    rules:
      - alert: PracticeHttpEndpointDown
        expr: probe_success{job="practice_http_endpoints"} == 0
        for: 1m
        labels:
          severity: warning
          category: stack_health
        annotations:
          summary: "Practice target {{ $labels.service_name }} is unreachable"
          description: "Blackbox HTTP probe to practice target {{ $labels.instance }} has failed for more than 1 minute."

      - alert: PracticeHttpEndpointSlow
        expr: avg_over_time(probe_duration_seconds{job="practice_http_endpoints"}[5m]) > 2
        for: 10m
        labels:
          severity: warning
          category: stack_health
        annotations:
          summary: "Practice target {{ $labels.service_name }} is slow"
          description: "Average HTTP probe duration for practice target {{ $labels.instance }} has stayed above 2 seconds for 10 minutes."

  - name: sensor_tcp_alerts
    rules:
      - alert: SensorTcpEndpointDown
        expr: probe_success{job="sensor_tcp_endpoints"} == 0
        for: 1m
        labels:
          severity: critical
          category: stack_health
        annotations:
          summary: "TCP service {{ $labels.service_name }} is unreachable"
          description: "Blackbox TCP probe to {{ $labels.instance }} has failed for more than 1 minute."

  - name: sensor_dns_alerts
    rules:
      - alert: SensorDnsResolutionFailing
        expr: probe_success{job="sensor_dns_endpoints"} == 0
        for: 1m
        labels:
          severity: critical
          category: stack_health
        annotations:
          summary: "DNS service {{ $labels.service_name }} is failing"
          description: "Blackbox DNS probe against {{ $labels.instance }} has failed for more than 1 minute."

      - alert: SensorDnsResolutionSlow
        expr: avg_over_time(probe_duration_seconds{job="sensor_dns_endpoints"}[5m]) > 1
        for: 10m
        labels:
          severity: warning
          category: stack_health
        annotations:
          summary: "DNS service {{ $labels.service_name }} is slow"
          description: "Average DNS probe duration for {{ $labels.instance }} has stayed above 1 second for 10 minutes."
