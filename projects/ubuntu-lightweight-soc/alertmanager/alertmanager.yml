global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "null"

# Add email or Telegram receivers only after replacing the placeholders with
# concrete values. Alertmanager does not expand ${ENV_VAR} tokens inside YAML.
